# Pre-commit hooks for HOU53-bot.
#
# Install once per clone:
#   uv run pre-commit install --install-hooks
#   uv run pre-commit install --hook-type commit-msg
#
# Run on the whole repo at any time:
#   uv run pre-commit run --all-files
#
# The selection below is intentionally small: every hook here is a gate we
# expect to hold the line in CI too. New hooks land via an ADR or a
# chore(ci) PR — not silently.

default_language_version:
  python: python3.14

repos:
  # --- Hygiene --------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        # The production model artifact is intentionally committed and is
        # currently ~1.6 MB. Keep a real ceiling for accidental large files.
        args: ["--maxkb=10000"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
        args: ["--unsafe"]  # allow custom tags in compose / gh actions
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: \.(md|patch)$|^data/external/
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # --- Secrets scanning ------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # --- Python: lint + format + types ----------------------------------------
  # Use the uv-managed environment so hooks run the same versions as CI/local
  # commands and can import workspace packages + runtime dependencies.
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        files: ^(ml/src|apps/api/src)/
        pass_filenames: false

  # --- Notebooks: strip outputs so diffs stay reviewable --------------------
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout

  # --- Conventional commit messages -----------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert
          - data
          - model
